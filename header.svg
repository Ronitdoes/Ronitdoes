<svg width="900" height="280" xmlns="http://www.w3.org/2000/svg" xmlns:xhtml="http://www.w3.org/1999/xhtml">
  <defs>
    <filter id="textGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
      .scanline { fill: #22C55E; opacity: 0.018; }
      .dot      { fill: #22C55E; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="900" height="280" fill="#0d0d0d" rx="8"/>

  <!-- Scanlines -->
  <rect width="900" height="1" y="20"  class="scanline"/>
  <rect width="900" height="1" y="36"  class="scanline"/>
  <rect width="900" height="1" y="52"  class="scanline"/>
  <rect width="900" height="1" y="68"  class="scanline"/>
  <rect width="900" height="1" y="84"  class="scanline"/>
  <rect width="900" height="1" y="100" class="scanline"/>
  <rect width="900" height="1" y="116" class="scanline"/>
  <rect width="900" height="1" y="132" class="scanline"/>
  <rect width="900" height="1" y="148" class="scanline"/>
  <rect width="900" height="1" y="164" class="scanline"/>
  <rect width="900" height="1" y="180" class="scanline"/>
  <rect width="900" height="1" y="196" class="scanline"/>
  <rect width="900" height="1" y="212" class="scanline"/>
  <rect width="900" height="1" y="228" class="scanline"/>
  <rect width="900" height="1" y="244" class="scanline"/>
  <rect width="900" height="1" y="260" class="scanline"/>

  <!-- Outer border -->
  <rect x="10" y="10" width="880" height="260" fill="none" stroke="#22C55E" stroke-width="1.5" opacity="0.4" rx="4"/>

  <!-- Corner decorations -->
  <polyline points="10,40 10,10 40,10"   fill="none" stroke="#22C55E" stroke-width="2"/>
  <polyline points="860,10 890,10 890,40" fill="none" stroke="#22C55E" stroke-width="2"/>
  <polyline points="10,240 10,270 40,270" fill="none" stroke="#22C55E" stroke-width="2"/>
  <polyline points="860,270 890,270 890,240" fill="none" stroke="#22C55E" stroke-width="2"/>

  <!-- Window dots -->
  <circle cx="32" cy="24" r="5" fill="#ff5f57"/>
  <circle cx="50" cy="24" r="5" fill="#ffbd2e"/>
  <circle cx="68" cy="24" r="5" fill="#28c940"/>

  <!-- Window title -->
  <text x="450" y="28" font-family="Courier New, monospace" font-size="11" fill="#555" text-anchor="middle">Ronitdoes@github ~ bash</text>

  <!-- Separator -->
  <line x1="10" y1="38" x2="890" y2="38" stroke="#22C55E" stroke-width="0.5" opacity="0.3"/>

  <!-- ASCII name via foreignObject for perfect monospace alignment -->
  <foreignObject x="18" y="44" width="864" height="120" opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.1s" begin="0.3s" fill="freeze"/>
    <xhtml:div xmlns="http://www.w3.org/1999/xhtml" style="filter: drop-shadow(0 0 4px #22C55E); display: flex; justify-content: center; width: 100%;">
      <xhtml:pre style="
        font-family: 'Courier New', Courier, monospace;
        font-size: 12px;
        font-weight: bold;
        color: #22C55E;
        margin: 0;
        padding: 0;
        line-height: 1.35;
        white-space: pre;
        background: transparent;
        display: inline-block;
      ">  ____             _ _     __  __       _           _
 |  _ \ ___  _ __ (_) |_  |  \/  | __ _| |__   __ _(_) __ _ _ __
 | |_) / _ \| '_ \| | __| | |\/| |/ _` | '_ \ / _` | |/ _` | '_ \
 |  _ &lt; (_) | | | | | |_  | |  | | (_| | | | | (_| | | (_| | | | |
 |_| \_\___/|_| |_|_|\__| |_|  |_|\__,_|_| |_|\__,_| |\__,_|_| |_|
                                                  |__/</xhtml:pre>
    </xhtml:div>
  </foreignObject>

  <!-- Tagline prompt -->
  <text x="22" y="188" font-family="Courier New, monospace" font-size="13" fill="#555" opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.4s" begin="0.8s" fill="freeze"/>
    $ echo "build. reliable. systems."
  </text>

  <!-- Echo output -->
  <text x="22" y="208" font-family="Courier New, monospace" font-size="13" fill="#22C55E" filter="url(#textGlow)" opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.4s" begin="1.3s" fill="freeze"/>
    build. reliable. systems.
  </text>

  <!-- Next prompt -->
  <text x="22" y="230" font-family="Courier New, monospace" font-size="13" fill="#555" opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.1s" begin="1.8s" fill="freeze"/>
    $
  </text>

  <!-- Blinking cursor -->
  <rect x="34" y="217" width="8" height="14" fill="#22C55E" opacity="0">
    <animate attributeName="opacity" values="0;0;1;1;0;0" dur="1s" begin="1.8s" repeatCount="indefinite"/>
  </rect>

  <!-- ONLINE pulse -->
  <circle cx="820" cy="255" r="4" fill="#22C55E" opacity="0.8">
    <animate attributeName="opacity" values="0.8;0.2;0.8" dur="2s" repeatCount="indefinite"/>
  </circle>
  <text x="832" y="259" font-family="Courier New, monospace" font-size="10" fill="#555">ONLINE</text>

  <!-- Decorative dots top right -->
  <g opacity="0.15">
    <circle cx="830" cy="60" r="1.5" class="dot"/>
    <circle cx="845" cy="60" r="1.5" class="dot"/>
    <circle cx="860" cy="60" r="1.5" class="dot"/>
    <circle cx="830" cy="75" r="1.5" class="dot"/>
    <circle cx="845" cy="75" r="1.5" class="dot"/>
    <circle cx="860" cy="75" r="1.5" class="dot"/>
    <circle cx="830" cy="90" r="1.5" class="dot"/>
    <circle cx="845" cy="90" r="1.5" class="dot"/>
    <circle cx="860" cy="90" r="1.5" class="dot"/>
    <circle cx="830" cy="105" r="1.5" class="dot"/>
    <circle cx="845" cy="105" r="1.5" class="dot"/>
    <circle cx="860" cy="105" r="1.5" class="dot"/>
  </g>

  <!-- Decorative dots bottom left -->
  <g opacity="0.15">
    <circle cx="20" cy="195" r="1.5" class="dot"/>
    <circle cx="35" cy="195" r="1.5" class="dot"/>
    <circle cx="20" cy="210" r="1.5" class="dot"/>
    <circle cx="35" cy="210" r="1.5" class="dot"/>
    <circle cx="20" cy="225" r="1.5" class="dot"/>
    <circle cx="35" cy="225" r="1.5" class="dot"/>
  </g>
</svg>
